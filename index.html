<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarot Growth Number · Major Arcana</title>
  <meta name="description" content="Discover your Major Arcana growth card by entering your birthdate." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #f5f0e8 0%, #eef2fb 50%, #f5f0e8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 80px;
    }

    /* ── HEADER ── */
    .tarot-header {
      width: 100%;
      max-width: 680px;
      text-align: center;
      padding: 72px 0 40px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #b8982a;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 600;
      color: #1a2340;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    h1 span {
      font-style: italic;
      color: #b8982a;
    }

    .subtitle {
      font-size: 16px;
      color: #556;
      line-height: 1.7;
      font-weight: 400;
    }

    /* ── ORNAMENT ── */
    .ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto 40px;
      width: 200px;
      color: #c8a84b;
      font-size: 18px;
    }

    .ornament::before,
    .ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8a84b);
    }

    .ornament::after {
      background: linear-gradient(90deg, #c8a84b, transparent);
    }

    /* ── INPUT CARD ── */
    .input-card {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      padding: 40px 40px 36px;
      box-shadow: 0 8px 40px rgba(26, 35, 64, .10), 0 2px 8px rgba(26, 35, 64, .06);
      margin-bottom: 32px;
    }

    /* ── SOUL CARD SECONDARY ── */
    .soul-section {
      border-top: 1px solid rgba(200, 168, 75, 0.2);
      margin-top: 28px;
      padding-top: 28px;
    }

    .soul-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .soul-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #253060, #1a2340);
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: #c8a84b;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(26, 35, 64, .3);
    }

    .soul-title-block {
      display: flex;
      flex-direction: column;
    }

    .soul-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c8a84b;
      margin-bottom: 3px;
    }

    .soul-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: #1a2340;
    }

    .soul-roman {
      font-size: 12px;
      color: #8890aa;
      margin-left: 6px;
    }

    .soul-text {
      font-size: 14px;
      line-height: 1.75;
      color: #2c3554;
      border-left: 2px solid #c8a84b;
      padding-left: 14px;
      margin-bottom: 14px;
    }

    .triple-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #f9f4e8, #f3ecd8);
      border: 1px solid #e0c97a;
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #8a6a10;
      margin-bottom: 18px;
    }

    .input-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #8890aa;
      margin-bottom: 12px;
    }

    .date-input {
      width: 100%;
      padding: 16px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 500;
      color: #1a2340;
      background: #f3f5fb;
      border: 1.5px solid transparent;
      border-radius: 16px;
      outline: none;
      transition: border-color .25s, box-shadow .25s, background .25s;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .date-input:focus {
      border-color: #c8a84b;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(200, 168, 75, .15);
    }

    .date-input::-webkit-calendar-picker-indicator {
      opacity: .5;
      cursor: pointer;
    }

    .calc-btn {
      margin-top: 24px;
      width: 100%;
      padding: 18px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .5px;
      color: #fff;
      background: linear-gradient(135deg, #c8a84b 0%, #a07820 100%);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, opacity .18s;
      box-shadow: 0 4px 20px rgba(160, 120, 32, .35);
    }

    .calc-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(160, 120, 32, .42);
    }

    .calc-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .calc-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .error-msg {
      margin-top: 14px;
      font-size: 13px;
      color: #c0392b;
      text-align: center;
    }

    /* ── RESULT CARD ── */
    .result-card {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, .95);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 16px 60px rgba(26, 35, 64, .14), 0 2px 8px rgba(26, 35, 64, .06);
      animation: slideUp .45s cubic-bezier(.16, 1, .3, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-banner {
      background: linear-gradient(135deg, #1a2340 0%, #253060 100%);
      padding: 36px 40px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .result-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top right, rgba(200, 168, 75, .25), transparent 65%);
      pointer-events: none;
    }

    .number-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c8a84b, #e6c96a);
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 600;
      color: #1a2340;
      margin-bottom: 18px;
      box-shadow: 0 4px 24px rgba(200, 168, 75, .55);
    }

    .arcana-name {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .arcana-roman {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c8a84b;
    }

    .result-body {
      padding: 32px 40px 36px;
    }

    .calc-trail {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
      color: #8890aa;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .trail-chip {
      background: #f0f3fa;
      border-radius: 100px;
      padding: 5px 12px;
      font-weight: 500;
      color: #556;
    }

    .trail-chip.final {
      background: #1a2340;
      color: #c8a84b;
      font-weight: 700;
    }

    .trail-arrow {
      color: #c8a84b;
      font-size: 16px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #c8a84b;
      margin-bottom: 12px;
    }

    .interpretation {
      font-size: 15px;
      line-height: 1.8;
      color: #2c3554;
      font-weight: 400;
      border-left: 3px solid #c8a84b;
      padding-left: 16px;
    }

    .keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
    }

    .kw-chip {
      font-size: 12px;
      font-weight: 500;
      color: #1a2340;
      background: linear-gradient(135deg, #f9f4e8, #f3ecd8);
      border: 1px solid #e0c97a;
      border-radius: 100px;
      padding: 5px 14px;
    }

    .reset-btn {
      display: block;
      margin: 28px auto 0;
      padding: 12px 32px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .5px;
      color: #8890aa;
      background: transparent;
      border: 1.5px solid #dde0ea;
      border-radius: 100px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }

    .reset-btn:hover {
      color: #1a2340;
      border-color: #1a2340;
    }

    /* ── MASTER NUMBER ── */
    .master-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, rgba(200, 168, 75, .25), rgba(200, 168, 75, .10));
      border: 1px solid rgba(200, 168, 75, .5);
      border-radius: 100px;
      padding: 5px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #e6c96a;
      margin-bottom: 16px;
    }

    .master-desc {
      font-size: 13px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.72);
      max-width: 340px;
      margin: 10px auto 0;
      font-style: italic;
    }

    .soul-master-notice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: linear-gradient(135deg, #f9f4e8, #f3ecd8);
      border: 1px solid #e0c97a;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.65;
      color: #5a3e00;
    }

    .soul-master-notice .icon {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── DETAIL LIST (NEW) ── */
    .detail-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 24px;
      background: rgba(255,255,255,0.4);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(200,168,75,0.15);
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #b8982a;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-text {
      font-size: 14px;
      line-height: 1.6;
      color: #3f4765;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="tarot-header">
    <div class="eyebrow">메이저 아르카나 · 소울카드</div>
    <h1>나의<br /><span>타로 소울카드</span></h1>
    <p class="subtitle">생년월일을 입력하면 퍼스낼리티 카드와 소울카드를<br />발견할 수 있습니다.</p>
  </header>

  <div class="ornament">✦</div>

  <!-- INPUT CARD -->
  <div class="input-card">
    <label class="input-label" for="birthdate">생년월일</label>
    <input id="birthdate" class="date-input" type="date" max="" oninput="onDateChange(this)" />
    <button id="calc-btn" class="calc-btn" disabled onclick="calculate()">
      소울카드 확인하기 ✦
    </button>
    <p id="error-msg" class="error-msg hidden"></p>
  </div>

  <!-- RESULT CARD (initially hidden) -->
  <div id="result-card" class="result-card hidden">
    <!-- 퍼스낼리티 카드 배너 -->
    <div class="result-banner">
      <div
        style="font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#c8a84b;margin-bottom:12px;">
        퍼스낼리티 카드</div>
      <div id="master-badge" class="master-badge hidden">✶ 마스터 넘버</div>
      <div id="number-badge" class="number-badge">?</div>
      <div id="arcana-name" class="arcana-name">—</div>
      <div id="arcana-roman" class="arcana-roman">— · Major Arcana</div>
      <p id="master-desc" class="master-desc hidden"></p>
    </div>
    <div class="result-body">
      <!-- 계산 과정 -->
      <div id="calc-trail" class="calc-trail"></div>
      <!-- 퍼스낼리티 해석 -->
      <div class="section-label">퍼스낼리티 카드 해석</div>
      <p id="interpretation" class="interpretation"></p>
      <div id="keywords" class="keywords"></div>
      <div id="pcard-details" class="detail-list hidden"></div>

      <!-- 소울카드 섹션 -->
      <div id="soul-section" class="soul-section hidden">
        <div id="triple-notice" class="triple-badge hidden">✦ 3개의 탄생 카드를 가진 특별한 영혼</div>
        <div class="soul-header">
          <div id="soul-badge" class="soul-badge">?</div>
          <div class="soul-title-block">
            <div class="soul-label">소울카드</div>
            <div>
              <span id="soul-name" class="soul-name">—</span>
              <span id="soul-roman" class="soul-roman">—</span>
            </div>
          </div>
        </div>
        <div id="soul-master-notice" class="soul-master-notice hidden">
          <span class="icon">✶</span>
          <span id="soul-master-text"></span>
        </div>
        <p id="soul-text" class="soul-text"></p>
        <div id="soul-keywords" class="keywords"></div>
        <div id="soul-details" class="detail-list hidden"></div>
      </div>

      <button class="reset-btn" onclick="resetAll()">← 다시 계산하기</button>
    </div>
  </div>

  <script>
    // ── 오늘 날짜를 max로 설정 ──
    document.getElementById('birthdate').max = new Date().toISOString().split('T')[0];

    function onDateChange(input) {
      document.getElementById('calc-btn').disabled = !input.value;
      document.getElementById('error-msg').classList.add('hidden');
    }

    // ──────────────────────────────────────────
    // 소울카드 표준 계산법 (마스터 넘버: 11, 22, 33)
    // 1. 월 + 일 + 연도(4자리) 를 각각 더함
    // 2. 합이 22 초과이면 자릿수 합산 감소
    //    단, 11 / 22 / 33 은 마스터 넘버로 중단
    // 3. 퍼스낼리티 카드의 자릿수 합산 = 소울카드
    // ──────────────────────────────────────────
    const MASTER_NUMS = new Set([11, 22, 33]);

    function digitSum(n) {
      return String(n).split('').reduce((a, c) => a + parseInt(c), 0);
    }

    function reduceToPersonality(sum) {
      // 마스터 넘버(11, 22, 33) 또는 22 이하가 될 때까지 자릿수 합산
      while (sum > 22 && !MASTER_NUMS.has(sum)) {
        sum = digitSum(sum);
      }
      return sum;
    }

    function calculate() {
      const input = document.getElementById('birthdate').value;
      if (!input) return;

      const [yyyyStr, mmStr, ddStr] = input.split('-');
      
      // 1단계: YYYYMMDD 8자리 문자열 변환 후 각 자릿수 합산
      const yyyymmdd = yyyyStr + mmStr + ddStr;
      const rawSum = digitSum(yyyymmdd);

      // 2단계: 퍼스낼리티 카드 도출 (마스터 넘버 포함)
      const pNum = reduceToPersonality(rawSum);

      // 3단계: 소울카드 = 퍼스낼리티 카드의 자릿수 합산
      //   (단, 33은 마스터 넘버로 그대로 유지)
      const sNum = (pNum < 10 || pNum === 33) ? pNum : digitSum(pNum);

      // 특수: 19 → 10(운명의 수레바퀴) → 1(마법사) : 3개 카드
      const isTriple = (pNum === 19);

      // ── 계산 과정 트레일 ──
      const trailEl = document.getElementById('calc-trail');
      trailEl.innerHTML = '';
      const trailSteps = [yyyymmdd.split('').join(' + '), String(rawSum)];
      if (rawSum !== pNum) trailSteps.push(String(pNum));

      trailSteps.forEach((chip, i) => {
        if (i > 0) {
          const arrow = document.createElement('span');
          arrow.className = 'trail-arrow'; arrow.textContent = '→';
          trailEl.appendChild(arrow);
        }
        const chipEl = document.createElement('span');
        chipEl.className = 'trail-chip'; chipEl.textContent = chip;
        trailEl.appendChild(chipEl);
      });
      // 최종 퍼스낼리티 숫자 강조
      const fa = document.createElement('span');
      fa.className = 'trail-arrow'; fa.textContent = '→'; trailEl.appendChild(fa);
      const fc = document.createElement('span');
      fc.className = 'trail-chip final'; fc.textContent = pNum; trailEl.appendChild(fc);

      // ── 퍼스낼리티 카드 UI ──
      const pCard = ARCANA[pNum];
      document.getElementById('number-badge').textContent = pNum;
      document.getElementById('arcana-name').textContent = pCard.name;
      document.getElementById('arcana-roman').textContent = pCard.roman + ' · Major Arcana';
      document.getElementById('interpretation').textContent = pCard.text;
      document.getElementById('keywords').innerHTML =
        pCard.keywords.map(k => `<span class="kw-chip">${k}</span>`).join('');
      
      const pDetails = document.getElementById('pcard-details');
      if (pCard.strengths) {
        pDetails.classList.remove('hidden');
        pDetails.innerHTML = renderDetails(pCard);
      } else {
        pDetails.classList.add('hidden');
      }

      // ── 마스터 넘버 배지 (퍼스낼리티 카드가 11 또는 22) ──
      const masterBadge = document.getElementById('master-badge');
      const masterDesc = document.getElementById('master-desc');
      const mn = MASTER_NUMBERS[pNum];
      if (mn) {
        masterBadge.textContent = `✶ 마스터 넘버 ${pNum}`;
        masterBadge.classList.remove('hidden');
        masterDesc.textContent = mn.bannerDesc;
        masterDesc.classList.remove('hidden');
      } else {
        masterBadge.classList.add('hidden');
        masterDesc.classList.add('hidden');
      }

      // ── 소울카드 UI ──
      const soulSection = document.getElementById('soul-section');
      const tripleNotice = document.getElementById('triple-notice');
      const soulMasterNotice = document.getElementById('soul-master-notice');
      const soulMasterText = document.getElementById('soul-master-text');

      if (pNum === sNum) {
        soulSection.classList.add('hidden');
      } else {
        soulSection.classList.remove('hidden');
        const sCard = ARCANA[sNum];
        document.getElementById('soul-badge').textContent = sNum;
        document.getElementById('soul-name').textContent = sCard.name;
        document.getElementById('soul-roman').textContent = sCard.roman;
        document.getElementById('soul-text').textContent = sCard.text;
        document.getElementById('soul-keywords').innerHTML =
          sCard.keywords.map(k => `<span class="kw-chip">${k}</span>`).join('');

        const sDetails = document.getElementById('soul-details');
        if (sCard.strengths) {
          sDetails.classList.remove('hidden');
          sDetails.innerHTML = renderDetails(sCard);
        } else {
          sDetails.classList.add('hidden');
        }

        // 퍼스낼리티가 마스터 넘버일 때 소울카드 섹션에 추가 안내
        if (mn) {
          soulMasterText.textContent = mn.soulDesc;
          soulMasterNotice.classList.remove('hidden');
        } else {
          soulMasterNotice.classList.add('hidden');
        }

        if (isTriple) {
          tripleNotice.classList.remove('hidden');
        } else {
          tripleNotice.classList.add('hidden');
        }
      }

      // ── 결과 카드 표시 ──
      const rc = document.getElementById('result-card');
      rc.classList.remove('hidden');
